<!DOCTYPE html>
<html>

<head>

<title>Student Demo Website</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Analytics Tag -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>

<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());

gtag('config', 'G-XXXXXXX'); 
</script>

<!-- Microsoft Clarity Script -->
<script type="text/javascript">
(function(c,l,a,r,i,t,y){
c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
})(window, document, "clarity", "script", "CLARITY_PROJECT_ID");
</script>

</head>

<body style="font-family: Arial; text-align:center;">

<h1>Student Practice Website</h1>
<p>Click the buttons below to generate events</p>

<hr>

<h2>Product Section</h2>

<button onclick="gtag('event','view_product');">
View Product
</button>

<br><br>

<button onclick="gtag('event','add_to_cart');">
Add to Cart
</button>

<br><br>

<button onclick="showPayment(); gtag('event','buy_now');">
Buy Now
</button>

<hr>

<h2>User Actions</h2>

<button onclick="gtag('event','signup_click');">
Sign Up
</button>

<br><br>

<button onclick="gtag('event','contact_click');">
Contact Us
</button>

<hr>

<a href="https://www.google.com"
onclick="gtag('event','external_link_click');">
Visit External Website
</a>

<hr>

<h2>Dummy Payment Gateway</h2>

<div id="paymentSection" style="display:none;">

<p>Enter Card Number</p>

<input type="text" id="cardNumber" placeholder="Enter Card Number">

<br><br>

<button onclick="processPayment()">Pay Now</button>

<p id="paymentResult"></p>

<p><b>Test Cards</b></p>

<p>
1111 1111 1111 1111 → Payment Success<br>
2222 2222 2222 2222 → Payment Failed
</p>

</div>

<script>

function showPayment(){
document.getElementById("paymentSection").style.display="block";
}

function processPayment(){

let card=document.getElementById("cardNumber").value.replace(/\s/g,'');
let result=document.getElementById("paymentResult");

if(card==="1111111111111111"){

result.innerHTML="✅ Payment Successful!";
result.style.color="green";

gtag('event','purchase',{
transaction_id:'DEMO'+Math.floor(Math.random()*100000),
value:1000,
currency:'INR'
});

}

else if(card==="2222222222222222"){

result.innerHTML="❌ Payment Failed!";
result.style.color="red";

}

else{

result.innerHTML="❌ Invalid Card - Payment Failed!";
result.style.color="red";

}

}

</script>

</body>
</html>
